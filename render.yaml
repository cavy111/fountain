services:
  - type: web
    name: pen-academy-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pen-academy-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: your-render-url.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-netlify-url.netlify.app
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_ID
        sync: false
      - key: WHATSAPP_VERSION
        value: v19.0
databases:
  - name: pen-academy-db
    plan: free